    <section class="places">
        <h1 class="place-title">WATERFALLS</h1>
        <div class="place-list">

            <div class="place-item" data-name="Bambarakanda Falls" 
                data-description="Bambarakanda Falls is the tallest waterfall in Sri Lanka, standing at 263 meters (863 feet). 
                Nestled in the central highlands of the Badulla District, this waterfall cascades down a rocky cliff surrounded by lush pine forests. 
                Despite its towering height, Bambarakanda is relatively hidden, requiring a scenic trek through tea plantations and forested paths to reach.
                 The waterfall is at its most magnificent during the rainy season when the water flow is at its strongest." 
                data-location="Badulla District Sri Lanka">
                <p>Bambarakanda Falls</p>
                <img src="images/Bambarakanda Falls.jpg" alt="Bambarakanda Falls">   
            </div>

            <div class="place-item" data-name="Diyaluma Falls" 
                data-description="Diyaluma Falls, at 220 meters (720 feet), is the second tallest waterfall in Sri Lanka and one of the most unique due to its natural rock pools.
                 Located near the town of Koslanda in the Badulla District, this multi-tiered waterfall offers visitors the chance to swim in stunning infinity pools at different levels of the falls.
                 A trek to the upper part of the falls rewards adventurers with breathtaking views of the surrounding valleys and tea estates." 
                data-location=" Badulla District, Sri Lanka">
                <p>Diyaluma Falls</p>
                <img src="images/Diyaluma Falls.jpg" alt="Diyaluma Falls">  
            </div>

            <div class="place-item" data-name="Ravana Falls" 
                data-description="Ravana Falls is one of Sri Lanka’s most famous and easily accessible waterfalls. It stands at 25 meters (82 feet) and is located near Ella in the Badulla District. The waterfall is named after King Ravana from the Ramayana epic,
                 who is believed to have hidden Princess Sita in a nearby cave. During the rainy season, the waterfall becomes a powerful cascade, while in the dry season,
                 it forms gentle streams flowing over the rock face. The site is a popular stop for travelers exploring Ella’s natural beauty." 
                data-location="Near Ella, Badulla District">
                <p>Ravana Falls</p>
                <img src="images/Ravana Falls.jpg" alt="Ravana Falls">
            </div>

            <div class="place-item" data-name="Dunhinda Falls" 
                data-description="Dunhinda Falls, also known as the 'Misty Cascade,' is a 64-meter (210-foot) waterfall located near Badulla. 
                It is named after the fine mist that rises as the water crashes into the pool below. The trek to the waterfall is about 1.5 km through scenic forest trails,
                 where visitors can encounter birds, monkeys, and exotic plants. Considered one of the most beautiful waterfalls in Sri Lanka, Dunhinda Falls is best viewed during the monsoon season when the water volume is at its peak." 
                data-location="Badulla District, Sri Lanka">
                <p>Dunhinda Falls</p>
                <img src="images/Dunhinda Falls.jpg" alt="Dunhinda Falls">
            </div>

            <div class="place-item" data-name="Devon Falls" 
                data-description="Standing at 97 meters (318 feet), Devon Falls is a striking waterfall located in the Nuwara Eliya District. 
                It is often called the 'Veil of the Valley' due to its elegant, curtain-like flow. The waterfall is visible from the Hatton-Nuwara Eliya road, 
                making it a popular stop for travelers. Devon Falls is named after a pioneer British coffee planter who cultivated the land nearby. The best view of the falls is from a designated viewpoint on the road, where visitors can also see St. Clair’s Falls in the distance." 
                data-location="Nuwara Eliya District, Sri Lanka">
                <p>Devon Falls</p>
                <img src="images/Devon Falls.jpg" alt="Devon Falls">
            </div>

            <div class="place-item" data-name="Laxapana Falls" 
                data-description="Laxapana Falls, at 126 meters (413 feet), is one of the most stunning waterfalls in Sri Lanka,
                 located in the Nuwara Eliya District. It is known for its connection to hydroelectric power generation, as it feeds into major power stations in the country. The waterfall is surrounded by lush greenery and tea plantations,
                  offering a scenic and peaceful escape. A hike down to the base of the falls provides a closer view of its magnificent drop and the refreshing mist that fills the air." 
                data-location=" Nuwara Eliya District, Sri Lanka">
                <p>Laxapana Falls</p>
                <img src="images/Laxapana Falls.jpg" alt="Laxapana Falls">
            </div>
